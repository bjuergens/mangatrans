name: Deploy PR Preview

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE="${BRANCH//\//-}"
          SAFE="${SAFE//[^a-zA-Z0-9-]/-}"
          echo "name=$SAFE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup
        run: npm run setup

      - name: Build
        run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/branches/${{ steps.branch.outputs.name }}/

      - name: Deploy preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: branches/${{ steps.branch.outputs.name }}
          clean: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = '${{ steps.branch.outputs.name }}';
            const previewUrl = `https://${owner}.github.io/${repo}/branches/${branch}/`;
            const mainUrl = `https://${owner}.github.io/${repo}/`;
            const body = `🚀 **Preview deployed:** ${previewUrl}\n\n📖 **Main branch:** ${mainUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Preview deployed')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.issue.number, body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE="${BRANCH//\//-}"
          SAFE="${SAFE//[^a-zA-Z0-9-]/-}"
          if [ -d "branches/$SAFE" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "branches/$SAFE"
            git commit -m "🗑️ Remove preview for $BRANCH"
            git push
          fi
        shell: bash
