name: Deploy

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: mkdir -p build-logs

      - name: Setup
        run: npm run setup 2>&1 | tee build-logs/setup.log
        shell: bash

      - name: Typecheck
        run: npm run check:typecheck 2>&1 | tee build-logs/typecheck.log
        shell: bash

      - name: Lint
        run: npm run check:lint 2>&1 | tee build-logs/lint.log
        shell: bash

      - name: Format check
        run: npm run check:format 2>&1 | tee build-logs/format.log
        shell: bash

      - name: Unit tests
        run: npm run check:test 2>&1 | tee build-logs/test.log
        shell: bash

      - name: Build
        run: npm run check:build 2>&1 | tee build-logs/build.log
        shell: bash
        env:
          BASE_URL: /${{ github.event.repository.name }}/

      - name: E2E tests
        run: npm run check:test:e2e 2>&1 | tee build-logs/e2e.log
        shell: bash

      - name: Generate build report
        if: always()
        run: bash scripts/build-report.sh

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          clean: true
          clean-exclude: |
            branches/
