name: CI

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sanitize branch name
        id: branch
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE="${BRANCH//\//-}"
          SAFE="${SAFE//[^a-zA-Z0-9-]/-}"
          echo "name=$SAFE" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: mkdir -p ci-logs

      - name: Setup
        run: npm run setup 2>&1 | tee ci-logs/setup.log
        shell: bash

      - name: Run all checks
        run: npm run check:all 2>&1 | tee ci-logs/check-all.log
        shell: bash

      - name: Concat logs
        if: always()
        run: |
          for file in ci-logs/*.log; do
            echo "=== $(basename "$file") ==="
            cat "$file"
            echo ""
          done > ci-logs.all.txt
          mkdir -p ci-deploy
          cp ci-logs.all.txt ci-deploy/
        shell: bash

      - name: Deploy CI logs to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ci-deploy
          target-folder: branches/${{ steps.branch.outputs.name }}/ci-logs
          clean: true

      - name: Comment CI logs link on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = '${{ steps.branch.outputs.name }}';
            const logsUrl = `https://${owner}.github.io/${repo}/branches/${branch}/ci-logs/ci-logs.all.txt`;
            const passed = '${{ job.status }}' === 'success';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';
            const body = `${icon} **CI ${status}** — [View logs](${logsUrl})`;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('CI ') && c.body.includes('View logs')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.issue.number, body,
              });
            }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
            ci-logs/
          retention-days: 7
