      // set by 404.html. Runs before React so BrowserRouter sees the correct URL.
      (function () {
        var query = window.location.search;
        if (query.length > 1) {
          var path = query.slice(1); // strip leading "?"

            /\/\//g,
            "/",
          );
          window.history.replaceState(
            null,
            "",
            restored + window.location.hash,
          );
        }
      })();
